name: proxypin
description: ProxyPin
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.3.0+35

environment:
  sdk: '>=3.0.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.9
  pointycastle: ^4.0.0
  logger: ^2.7.0
  date_format: ^2.0.9
  window_manager: ^0.5.2
  screen_retriever: ^0.2.2
  desktop_multi_window: ^0.3.0
  path_provider: ^2.1.5
  file_picker: ^12.0.0-beta.7
  proxy_manager: ^0.0.3
  permission_handler: ^12.0.1
  flutter_toastr: ^1.0.3
  share_plus: ^13.2.0
  flutter_js: ^0.8.7
#  flutter_highlight: ^0.7.0
  flutter_desktop_context_menu: ^0.2.0
  device_info_plus: ^13.2.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  toastification: ^3.0.2
  get: ^4.7.3
  zstandard: ^1.5.0
  qr_flutter: ^4.1.0
  flutter_qr_reader_plus: ^1.0.6
  brotli: ^0.6.0
  html: ^0.15.6
  xml: ^7.0.1
  ffi: ^2.1.0
  win32audio: ^1.5.0
  scrollable_positioned_list_nic: ^0.0.2
  tray_manager: ^0.5.3
  code_forge: ^10.7.1
  archive: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# The following section is specific to Flutter packages.
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/certs/ca.crt
    - assets/certs/ca_key.pem
    - assets/icon.png
    - assets/icon.ico
    - assets/icon_foreground.png
    - assets/js/