name: Flutter iOS CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: flutter-ios-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NON_BLOCKING_TESTS_JSON: >-
    ["test/cert_test.dart","test/favorites_trim_test.dart","test/http_test.dart","test/js_test.dart","test/multi_select_controller_test.dart","test/web_test.dart"]

jobs:
  ios-test:
    name: Flutter test (iOS)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run stable tests
        shell: pwsh
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          $allTests = Get-ChildItem -Path test -Filter *.dart -File | Sort-Object Name | ForEach-Object { "test/$($_.Name)" }
          $stableTests = $allTests | Where-Object { $_ -notin $nonBlockingTests }
          Write-Host "Running stable tests:"
          $stableTests | ForEach-Object { Write-Host $_ }
          & flutter test @stableTests

      - name: Run non-blocking legacy tests
        shell: pwsh
        continue-on-error: true
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          Write-Host "Running non-blocking tests:"
          $nonBlockingTests | ForEach-Object { Write-Host $_ }
          & flutter test @nonBlockingTests

  ios-build:
    name: Flutter build (iOS)
    runs-on: macos-latest
    timeout-minutes: 60
    needs: ios-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Upload iOS app bundle
        uses: actions/upload-artifact@v4
        with:
          name: proxypin-ios-app
          path: build/ios/iphoneos/Runner.app/**
          if-no-files-found: error
