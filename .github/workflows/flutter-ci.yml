name: Flutter CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-test:
    name: Flutter test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NON_BLOCKING_TESTS_JSON: >-
        ["test/cert_test.dart","test/favorites_trim_test.dart","test/http_test.dart","test/js_test.dart","test/multi_select_controller_test.dart","test/web_test.dart"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run stable tests
        shell: pwsh
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          $allTests = Get-ChildItem -Path test -Filter *.dart -File | Sort-Object Name | ForEach-Object { "test/$($_.Name)" }
          $stableTests = $allTests | Where-Object { $_ -notin $nonBlockingTests }
          Write-Host "Running stable tests:"
          $stableTests | ForEach-Object { Write-Host $_ }
          & flutter test @stableTests

      - name: Run non-blocking legacy tests
        shell: pwsh
        continue-on-error: true
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          Write-Host "Running non-blocking tests:"
          $nonBlockingTests | ForEach-Object { Write-Host $_ }
          & flutter test @nonBlockingTests

  windows-test:
    name: Flutter test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      NON_BLOCKING_TESTS_JSON: >-
        ["test/cert_test.dart","test/favorites_trim_test.dart","test/http_test.dart","test/js_test.dart","test/multi_select_controller_test.dart","test/web_test.dart"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run stable tests
        shell: pwsh
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          $allTests = Get-ChildItem -Path test -Filter *.dart -File | Sort-Object Name | ForEach-Object { "test/$($_.Name)" }
          $stableTests = $allTests | Where-Object { $_ -notin $nonBlockingTests }
          Write-Host "Running stable tests:"
          $stableTests | ForEach-Object { Write-Host $_ }
          & flutter test @stableTests

      - name: Run non-blocking legacy tests
        shell: pwsh
        continue-on-error: true
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          Write-Host "Running non-blocking tests:"
          $nonBlockingTests | ForEach-Object { Write-Host $_ }
          & flutter test @nonBlockingTests

  linux-build:
    name: Flutter build (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: linux-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux binary
        run: flutter build linux --release

      - name: Archive Linux bundle
        shell: bash
        run: |
          cd build/linux/x64/release
          tar -czf proxypin-linux-x64.tar.gz bundle

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: proxypin-linux-x64
          path: build/linux/x64/release/proxypin-linux-x64.tar.gz
          if-no-files-found: error

  windows-build:
    name: Flutter build (Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    needs: windows-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows binary
        run: flutter build windows --release

      - name: Archive Windows bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/x64/runner/proxypin-windows-x64.zip -Force

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: proxypin-windows-x64
          path: build/windows/x64/runner/proxypin-windows-x64.zip
          if-no-files-found: error
