name: Flutter Linux CI

on:
  push:
    branches:
      - main
      - ci
  pull_request:
  workflow_dispatch:

concurrency:
  group: flutter-linux-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NON_BLOCKING_TESTS_JSON: >-
    ["test/cert_test.dart","test/favorites_trim_test.dart","test/http_test.dart","test/js_test.dart","test/multi_select_controller_test.dart","test/web_test.dart"]

jobs:
  linux-test:
    name: Flutter test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run stable tests
        shell: pwsh
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          $allTests = Get-ChildItem -Path test -Recurse -Filter *.dart -File |
            Where-Object { $_.FullName -notmatch '[\\/]+accessibility[\\/]' } |
            Sort-Object FullName |
            ForEach-Object { ((Resolve-Path -Relative $_.FullName) -replace '^[.][\\/]', '') -replace '\\', '/' }
          $stableTests = $allTests | Where-Object { $_ -notin $nonBlockingTests }
          Write-Host "Running stable tests:"
          $stableTests | ForEach-Object { Write-Host $_ }
          & flutter test @stableTests

      - name: Run non-blocking legacy tests
        shell: pwsh
        continue-on-error: true
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          Write-Host "Running non-blocking tests:"
          $nonBlockingTests | ForEach-Object { Write-Host $_ }
          & flutter test @nonBlockingTests

  linux-build:
    name: Flutter build (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: linux-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux binary
        run: flutter build linux --release

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: proxypin-linux-x64
          path: build/linux/x64/release/bundle/**
          if-no-files-found: error
