name: Flutter Windows CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: flutter-windows-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NON_BLOCKING_TESTS_JSON: >-
    ["test/cert_test.dart","test/favorites_trim_test.dart","test/http_test.dart","test/js_test.dart","test/multi_select_controller_test.dart","test/web_test.dart"]

jobs:
  windows-test:
    name: Flutter test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run stable tests
        shell: pwsh
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          $allTests = Get-ChildItem -Path test -Filter *.dart -File | Sort-Object Name | ForEach-Object { "test/$($_.Name)" }
          $stableTests = $allTests | Where-Object { $_ -notin $nonBlockingTests }
          Write-Host "Running stable tests:"
          $stableTests | ForEach-Object { Write-Host $_ }
          & flutter test @stableTests

      - name: Run non-blocking legacy tests
        shell: pwsh
        continue-on-error: true
        run: |
          $nonBlockingTests = ConvertFrom-Json '${{ env.NON_BLOCKING_TESTS_JSON }}'
          Write-Host "Running non-blocking tests:"
          $nonBlockingTests | ForEach-Object { Write-Host $_ }
          & flutter test @nonBlockingTests

  windows-build:
    name: Flutter build (Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    needs: windows-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows binary
        run: flutter build windows --release

      - name: Archive Windows bundle
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/x64/runner/proxypin-windows-x64.zip -Force

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: proxypin-windows-x64
          path: build/windows/x64/runner/proxypin-windows-x64.zip
          if-no-files-found: error
